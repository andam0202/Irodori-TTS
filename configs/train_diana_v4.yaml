model:
  # ── Core architecture (600M, shared with v2/v3) ──
  latent_dim: 32
  latent_patch_size: 1
  text_vocab_size: 99574
  text_tokenizer_repo: llm-jp/llm-jp-3-150m
  model_dim: 1280
  num_layers: 12
  num_heads: 20
  mlp_ratio: 2.875
  text_mlp_ratio: 2.6
  speaker_mlp_ratio: 2.6
  text_dim: 512
  text_layers: 10
  text_heads: 8
  speaker_dim: 768
  speaker_layers: 8
  speaker_heads: 12
  speaker_patch_size: 1
  timestep_embed_dim: 512
  adaln_rank: 192

  # ── v3 VoiceDesign: caption + speaker + duration predictor ──
  use_caption_condition: true
  use_speaker_condition: true
  caption_vocab_size: 99574
  caption_tokenizer_repo: llm-jp/llm-jp-3-150m
  caption_add_bos: true
  caption_dim: 512
  caption_layers: 10
  caption_heads: 8
  caption_mlp_ratio: 2.6
  use_duration_predictor: true
  duration_aux_dim: 14
  duration_hidden_dim: 1024
  duration_layers: 3
  duration_dropout: 0.1
  duration_attention_heads: 8
  duration_architecture: token_sum_dual_adarn_zero_no_aux
  duration_token_init_frames: 9.0
  duration_speaker_fusion: adarn_zero
  duration_caption_fusion: adarn_zero
  duration_caption_pooling: masked_mean

train:
  # ── Data (mamimi-specific, small dataset) ──
  batch_size: 4
  gradient_accumulation_steps: 4
  num_workers: 4
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 2
  max_latent_steps: 750
  max_text_len: 256
  max_caption_len: 512

  # ── v3 variable-length training ──
  fixed_target_latent_steps:
  fixed_target_full_mask: false
  rf_loss_mode: utterance_mean

  # ── Precision and optimization ──
  allow_tf32: true
  compile_model: false
  precision: bf16
  optimizer: adamw
  learning_rate: 0.00005
  weight_decay: 0.01

  # ── WSD schedule ──
  lr_scheduler: wsd
  warmup_steps: 100
  stable_steps: 2600
  min_lr_scale: 0.01
  max_steps: 3000

  # ── Condition dropout (enables CFG at inference) ──
  text_condition_dropout: 0.1
  speaker_condition_dropout: 0.1
  caption_condition_dropout: 0.1
  timestep_stratified: true

  # ── Duration predictor joint training ──
  duration_loss_weight: 0.1
  duration_speaker_dropout: 0.1
  duration_caption_dropout: 0.1
  duration_huber_delta: 0.1

  # ── Logging and checkpoints ──
  log_every: 50
  save_every: 300
  checkpoint_best_n: 5
  valid_ratio: 0.05
  valid_every: 300

  # ── W&B ──
  wandb_enabled: false
  wandb_project: irodori-tts-diana
  wandb_run_name: diana-v4

  # ── LoRA (mamimi-optimized) ──
  lora_enabled: true
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  lora_bias: none
  lora_target_modules: diffusion_attn_mlp
  lora_modules_to_save: auto

  seed: 42
  ddp_find_unused_parameters: false
